<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Agregar Acta de Reunión</title>
    <link rel="stylesheet" href="../static/styles.css" th:href="@{/styles.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        .acta-form-wrapper {
            max-width: 780px;
            margin: 0 auto;
        }

        .acta-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, var(--color-secondary), var(--color-primary));
            color: white;
            padding: 0.35rem 1rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 1.2rem;
        }

        .form-section {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 1.5rem 2rem;
            margin-bottom: 1.5rem;
        }

        .form-section-title {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-secondary);
            margin-bottom: 1.2rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid var(--color-border);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 1.2rem;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-group label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--color-text);
        }

        .form-group input,
        .form-group textarea {
            background: var(--color-bg);
            border: 1.5px solid var(--color-border);
            border-radius: 8px;
            padding: 0.7rem 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: var(--color-text);
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--color-secondary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 110px;
        }

        .required {
            color: #ef4444;
        }

        .hint {
            font-size: 0.78rem;
            color: var(--color-text-muted, #888);
            margin-top: 0.2rem;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: flex-end;
            margin-top: 0.5rem;
        }

        .btn-secondary {
            padding: 0.7rem 1.6rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            color: var(--color-text);
            background: var(--color-surface);
            border: 1.5px solid var(--color-border);
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-secondary:hover {
            background: var(--color-border);
        }

        .flash-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
            border-radius: 10px;
            padding: 0.9rem 1.4rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .flash-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
            border-radius: 10px;
            padding: 0.9rem 1.4rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
    </style>
</head>

<body>

    <div th:replace="fragments/navbar :: header"></div>

    <div class="container" style="margin-top: 3rem; margin-bottom: 4rem;">
        <main class="content-full">
            <div class="acta-form-wrapper">
                <header class="article-header">
                    <div class="acta-badge">📋 Actas de Reunión</div>
                    <h1>Nueva Acta</h1>
                    <p class="lead">Registra los detalles de la reunión para mantener un historial ordenado.</p>
                </header>

                <!-- Mensajes flash -->
                <div th:if="${exito}" class="flash-success">
                    <span>✅</span>
                    <span th:text="${exito}"></span>
                </div>
                <div th:if="${error}" class="flash-error">
                    <span>❌</span>
                    <span th:text="${error}"></span>
                </div>

                <form th:action="@{/actas/agregar}" method="post">

                    <!-- Sección: Información General -->
                    <div class="form-section">
                        <div class="form-section-title">📌 Información General</div>

                        <div class="form-group">
                            <label for="titulo">Título de la Reunión <span class="required">*</span></label>
                            <input type="text" id="titulo" name="titulo"
                                placeholder="Ej: Reunión de planificación Sprint 3" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="fecha">Fecha de la Reunión <span class="required">*</span></label>
                                <input type="date" id="fecha" name="fecha" required>
                            </div>
                            <div class="form-group">
                                <label for="lugar">Lugar / Modalidad <span class="required">*</span></label>
                                <input type="text" id="lugar" name="lugar" placeholder="Ej: Sala B, Google Meet..."
                                    required>
                            </div>
                        </div>
                    </div>

                    <!-- Sección: Asistentes -->
                    <div class="form-section">
                        <div class="form-section-title">👥 Asistentes</div>
                        <div class="form-group">
                            <label for="asistentes">Lista de Asistentes <span class="required">*</span></label>
                            <textarea id="asistentes" name="asistentes"
                                placeholder="Ej:&#10;- Sebastián (Scrum Master)&#10;- Vanessa (UI/UX)&#10;- Santiago (DevOps)"
                                required></textarea>
                            <span class="hint">Un asistente por línea recomendado.</span>
                        </div>
                    </div>

                    <!-- Sección: Contenido -->
                    <div class="form-section">
                        <div class="form-section-title">📝 Contenido de la Reunión</div>
                        <div class="form-group">
                            <label for="temas">Temas Tratados <span class="required">*</span></label>
                            <textarea id="temas" name="temas"
                                placeholder="Ej:&#10;1. Revisión del sprint anterior&#10;2. Planificación de tareas para el sprint 3&#10;3. Discusión de arquitectura..."
                                required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="acuerdos">Acuerdos y Compromisos <span class="required">*</span></label>
                            <textarea id="acuerdos" name="acuerdos"
                                placeholder="Ej:&#10;- Sebastián entregará el módulo de autenticación el viernes&#10;- Vanessa revisará los mockups antes del jueves..."
                                required></textarea>
                        </div>
                        <div class="form-group">
                            <label for="observaciones">Observaciones (opcional)</label>
                            <textarea id="observaciones" name="observaciones" style="min-height: 80px;"
                                placeholder="Cualquier nota adicional relevante para la reunión..."></textarea>
                        </div>
                    </div>

                    <!-- Acciones -->
                    <div class="form-actions">
                        <a th:href="@{/actas/lista}" class="btn-secondary">Ver todas las actas</a>
                        <button type="submit" class="btn-primary">💾 Guardar Acta</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

</body>

</html>
