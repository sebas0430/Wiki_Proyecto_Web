<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Personas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
            border-bottom: 3px solid #4CAF50;
            padding-bottom: 10px;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background-color: white;
            margin: 10px 0;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .persona-info {
            display: flex;
            justify-content: space-between;
        }
        .nombre {
            font-weight: bold;
            color: #4CAF50;
        }
        .telefono {
            color: #666;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        a:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Lista de Personas</h1>

    <ul>
        <li th:each="persona : ${personas}">
            <div class="persona-info">
                <span class="nombre" th:text="${persona.nombre} + ' ' + ${persona.apellido}"></span>
                <span class="telefono" th:text="'Tel: ' + ${persona.telefono}"></span>
            </div>
        </li>
    </ul>

    <a th:href="@{/formularios/nueva-persona}">Agregar Nueva Persona</a>
    <a th:href="@{/}">Volver al Inicio</a>
</body>
</html>
